- defaults:
    link:
      create: true
      relink: true

- clean: ["~"]

- link:
    ~/.oh-my-zsh:
    ~/.oh-my-zsh-custom:
    ~/.bash_aliases:
    ~/.bash_profile:
    ~/.bashrc:
    ~/.config/bat/config: bat.conf
    ~/.config/nvim:
    ~/.config/k9s:
    ~/.git-prompt-colors.sh:
    ~/.gitconfig:
    ~/.screenrc:
    ~/.shell.aliases:
    ~/.shell.env:
    ~/.shell.rc:
    ~/.tmux.conf:
    ~/.tmux:
    ~/.todo.actions.d:
    ~/.todo:
    ~/.vim/after/plugin/abolish.vim: vim/after/plugin/abolish.vim
    ~/.vim/bundle/Vundle.vim: Vundle.vim
    ~/.vimrc:
    ~/.zshrc:
    ~/.zshenv:
    ~/.vale.ini:
    ~/.markdownlintrc:

- shell:
    - [git submodule update --init --recursive, Installing submodules]
