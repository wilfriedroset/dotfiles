MinAlertLevel = warning
Packages = Google, alex, proselint, Microsoft, write-good, Readability,  https://github.com/grafana/writers-toolkit/releases/download/vale/v1.0.0-rc.1/Grafana.zip
Vale.Terms = NO
Vale.Avoid = NO
Vale.Spelling = NO
Microsoft.Contractions = NO
Google.Headings = NO
Microsoft.HeadingPunctuation = NO
Google.Units = NO
StylesPath = ~/.vale/styles

[*.md]
BasedOnStyles = Grafana
TokenIgnores = (\*\*\{\w*\}\*\*), (<http[^\n]+>+?), \*\*[^\n]+\*\*
