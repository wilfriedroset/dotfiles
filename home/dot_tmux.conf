set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'niqodea/tmux-matryoshka'

# C-b is not acceptable -- Vim uses it
set-option -g prefix C-a
# auto window rename
set-window-option -g automatic-rename

set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_default_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"

set -g @matryoshka_inactive_status_style_strategy 'sed'
set -g @matryoshka_inactive_status_style 's/181825/45475a/g;'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""

set -g mouse on

# Start numbering at 1
set -g base-index 1
# renumber windows sequentially after closing any of them
set -g renumber-windows on

# don't suspend-client
unbind-key C-z

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."
bind-key C-r source-file ~/.tmux.conf\; display-message "Config reloaded..."

# short cut to toggle synchronized panes and update status line
bind e \
    set synchronize-panes \;\
    refresh-client -S

setw -g mode-keys vi

unbind [
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection
bind P paste-buffer

# Same screen's shortcut
bind-key A command-prompt 'rename-window %%'

# horizontal split #
bind-key S split-window -v -c "#{pane_current_path}"
bind-key h split-window -v -c "#{pane_current_path}"
# vertical split #
bind-key | split-window -h -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"

# Resize shorcut
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# ===================
# ===    Ending   ===
# ===================

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf).
# TPM itself is installed and version-pinned via chezmoi (.chezmoiexternal.toml),
# so it is intentionally not listed as a @plugin: self-installing over the
# archive-provisioned dir fails a git-remote check and aborts a headless
# `prefix + I` / install_plugins run.
run -b '~/.tmux/plugins/tpm/tpm'
