"$schema" = 'https://starship.rs/config-schema.json'

# Blank line before the prompt (default), but no line_break inside the
# format ‚Äî info modules and the prompt char share a single row.
add_newline = true

format = """
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$python\
$character"""

[hostname]
# Default format trails with " in "; trim it so SSH boxes read
# "üåê hostname ~ ‚ùØ" instead of "üåê hostname in ~ ‚ùØ". ssh_only stays
# true (the default), so this whole block is silent on local shells.
format = "[$ssh_symbol$hostname]($style) "
style = "bright-black"

[directory]
style = "blue"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_status]
# Outer (...) makes the entire format ‚Äî trailing space included ‚Äî
# conditional on any var being non-empty, so a clean repo doesn't add
# an extra gap between $git_branch and $character. Leading space lives
# inside the ($ahead_behind$stashed) group so a dirty-only render
# stays single-spaced.
format = "([[(*$conflicted$untracked$modified$staged$renamed$deleted)](218)( $ahead_behind$stashed)]($style) )"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
