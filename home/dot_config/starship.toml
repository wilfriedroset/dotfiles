"$schema" = 'https://starship.rs/config-schema.json'

# Blank line before the prompt (default), but no line_break inside the
# format — info modules and the prompt char share a single row.
add_newline = true

format = """
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
${env_var.VIRTUAL_ENV_PROMPT}\
$character"""

[hostname]
# Default format trails with " in "; trim it so SSH boxes read
# "🌐 hostname ~ ❯" instead of "🌐 hostname in ~ ❯". ssh_only stays
# true (the default), so this whole block is silent on local shells.
format = "[$ssh_symbol$hostname]($style) "
style = "bright-black"

[directory]
style = "blue"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_status]
# Outer (...) makes the entire format — trailing space included —
# conditional on any var being non-empty, so a clean repo doesn't add
# an extra gap between $git_branch and $character. Leading space lives
# inside the ($ahead_behind$stashed) group so a dirty-only render
# stays single-spaced.
format = "([[(*$conflicted$untracked$modified$staged$renamed$deleted)](218)( $ahead_behind$stashed)]($style) )"
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[env_var.VIRTUAL_ENV_PROMPT]
# Replaces the built-in $python module, which scans every file in the CWD
# on each prompt to decide whether to render — that scan blows past the
# 30ms scan_timeout on slow/large remote $HOME dirs ("Scanning current
# directory timed out"). venv already exports VIRTUAL_ENV_PROMPT (e.g.
# "(myenv) "), so reading it costs nothing and renders identically.
format = "[$env_value]($style)"
style = "bright-black"
