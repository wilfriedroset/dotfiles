# External git repos cloned by `chezmoi apply`.
# Replaces the git submodules used by the previous dotbot setup so a fresh
# install needs only the chezmoi one-liner.

[".zsh/plugins/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    refreshPeriod = "168h"

[".tmux/plugins/tpm"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tpm.git"
    refreshPeriod = "168h"

[".bash-git-prompt"]
    type = "git-repo"
    url = "https://github.com/magicmonty/bash-git-prompt.git"
    refreshPeriod = "168h"

[".vim/bundle/Vundle.vim"]
    type = "git-repo"
    url = "https://github.com/VundleVim/Vundle.vim.git"
    refreshPeriod = "168h"

[".todo.actions.d/graph"]
    type = "git-repo"
    url = "https://github.com/timpulver/todo.txt-graph.git"
    refreshPeriod = "168h"

[".todo.actions.d/chcon"]
    type = "git-repo"
    url = "https://github.com/kunkku/todo.txt-cli-chcon.git"
    refreshPeriod = "168h"
